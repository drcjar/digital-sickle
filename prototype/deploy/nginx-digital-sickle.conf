# nginx site for digital-sickle.carlreynolds.net — reverse proxy to the Node app.
# Install: sudo cp nginx-digital-sickle.conf /etc/nginx/sites-available/digital-sickle
#          sudo ln -s /etc/nginx/sites-available/digital-sickle /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see ../../docs/deployment.md) to add HTTPS automatically.

server {
    listen 80;
    listen [::]:80;
    server_name digital-sickle.carlreynolds.net;

    # The app limits uploads to 5 MB; allow a little headroom.
    client_max_body_size 6m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
